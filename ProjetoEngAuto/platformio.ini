[env:arduino_nano_esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	iakop/LiquidCrystal_I2C_ESP32@^1.1.6
	madhephaestus/ESP32Servo@^3.1.3
	adafruit/Adafruit SSD1306@^2.5.16
	adafruit/Adafruit GFX Library@^1.12.5
	khoih-prog/BlynkESP32_BT_WF@^1.2.2
	blynkkk/Blynk@^1.3.2
	
